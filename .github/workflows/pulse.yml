name: pulse
# Пульс каналу персон (E5 автоаудиту): щоденний тестовий стук міряє час
# відповіді зграї. Ім'я «пульс» зарезервоване — зграя відповідає і
# закриває без реєстрації. Крон стоїть перед хмарним підмітанням зграї
# (flock 5:17), щоб канал відповідав навіть коли машина Майстерні спить.

on:
  workflow_dispatch:
  schedule:
    - cron: '10 5 * * *'

permissions:
  contents: write
  issues: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: стук і замір
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/pulse.sh
