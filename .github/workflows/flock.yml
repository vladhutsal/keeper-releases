name: flock
# Хмарна зграя: стук (issue «knock: …») будить її навіть коли машина
# Майстерні вимкнена. Розклад — підмітає пропущене двічі на день.
# Живе в публічній вітрині: канал персон — саме цей репозиторій.
on:
  issues:
    types: [opened]
  workflow_dispatch:
  schedule:
    - cron: '17 5,17 * * *'

permissions:
  contents: write
  issues: write

jobs:
  hear:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, 'knock:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: чути стуки
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/flock.sh
